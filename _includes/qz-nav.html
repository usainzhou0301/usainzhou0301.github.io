<style>
/* ============ Vertical sidebar navigation ============ */
.qz-nav{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:16px 14px 18px;
  background:linear-gradient(180deg,#ffffff 0%,#f4f8ff 100%);
  border:1px solid #dfe7f2;
  border-radius:18px;
  box-shadow:0 6px 22px rgba(27,58,107,.09);
  position:relative;
  overflow:hidden;
}
.qz-nav::before{
  content:"";
  position:absolute;
  left:0; right:0; top:0;
  height:3px;
  background:linear-gradient(90deg,#1B3A6B,#2E6BB8,#5aa0ff,#2E6BB8,#1B3A6B);
  background-size:200% 100%;
  animation:qz-nav-shimmer 8s linear infinite;
}
@keyframes qz-nav-shimmer{
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}
.qz-nav-title{
  font-size:11px;
  color:#8892a1;
  letter-spacing:1.4px;
  text-transform:uppercase;
  font-weight:700;
  padding:6px 8px 4px;
  margin-bottom:2px;
  border-bottom:1px dashed #e4e8ee;
}
.qz-nav a.qz-nav-item{
  display:flex;
  align-items:center;
  gap:11px;
  padding:11px 13px;
  border-radius:11px;
  background:#fff;
  border:1px solid #e8ecf3;
  color:#2b3648;
  font-size:13.6px;
  font-weight:600;
  letter-spacing:.15px;
  text-decoration:none !important;
  transition:transform .18s ease, box-shadow .18s ease,
             background .18s ease, color .18s ease, border-color .18s ease;
  position:relative;
  overflow:hidden;
}
.qz-nav a.qz-nav-item:hover{
  transform:translateX(3px);
  border-color:#c6d5ec;
  box-shadow:0 6px 14px rgba(27,58,107,.10);
  color:#1B3A6B;
  background:#f6faff;
}
.qz-nav a.qz-nav-item .qz-nav-ico{
  font-size:17px;
  line-height:1;
  width:22px;
  text-align:center;
  flex:0 0 auto;
}
.qz-nav a.qz-nav-item .qz-nav-txt{ flex:1 1 auto; }
.qz-nav a.qz-nav-item.active{
  background:linear-gradient(135deg,#1B3A6B 0%,#2E6BB8 100%);
  color:#fff !important;
  border-color:transparent;
  box-shadow:0 10px 20px rgba(27,58,107,.32),
             inset 0 1px 0 rgba(255,255,255,.15);
}
.qz-nav a.qz-nav-item.active::after{
  content:"";
  position:absolute;
  right:14px; top:50%;
  width:6px; height:6px;
  border-radius:50%;
  background:#ffd76a;
  box-shadow:0 0 0 3px rgba(255,215,106,.25);
  transform:translateY(-50%);
  animation:qz-pulse 1.8s ease-in-out infinite;
}
.qz-nav a.qz-nav-item.active:hover{
  transform:translateX(2px);
  box-shadow:0 14px 26px rgba(27,58,107,.42);
}
@keyframes qz-pulse{
  0%,100%{ box-shadow:0 0 0 3px rgba(255,215,106,.25); }
  50%    { box-shadow:0 0 0 7px rgba(255,215,106,.02); }
}
/* footer inside nav */
.qz-nav-foot{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
  padding:10px 4px 2px;
  border-top:1px dashed #e4e8ee;
}
.qz-nav-foot-label{
  font-size:11px;
  color:#8892a1;
  letter-spacing:1.2px;
  text-transform:uppercase;
  font-weight:700;
  padding:2px 4px 4px;
}
.qz-nav-foot a{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  font-size:11.8px;
  color:#1B3A6B !important;
  background:#fff;
  border:1px solid #e8ecf3;
  border-radius:9px;
  text-decoration:none !important;
  font-weight:600;
  transition:all .18s ease;
  word-break:break-all;
  line-height:1.3;
}
.qz-nav-foot a .qz-nav-foot-ico{
  font-size:14px;
  flex:0 0 auto;
}
.qz-nav-foot a:hover{
  background:#2E6BB8;
  color:#fff !important;
  border-color:#2E6BB8;
  transform:translateX(2px);
}
</style>

{% assign qzu = page.url %}
<nav class="qz-nav" aria-label="Primary">
  <div class="qz-nav-title">Navigation</div>

  <a href="{{ site.baseurl }}/" class="qz-nav-item{% if qzu == '/' %} active{% endif %}">
    <span class="qz-nav-ico">🏠</span><span class="qz-nav-txt">Home</span>
  </a>
  <a href="{{ site.baseurl }}/experience/" class="qz-nav-item{% if qzu contains '/experience' %} active{% endif %}">
    <span class="qz-nav-ico">👤</span><span class="qz-nav-txt">Experience</span>
  </a>
  <a href="{{ site.baseurl }}/publications/" class="qz-nav-item{% if qzu contains '/publications' %} active{% endif %}">
    <span class="qz-nav-ico">📚</span><span class="qz-nav-txt">Publications</span>
  </a>
  <a href="{{ site.baseurl }}/awards/" class="qz-nav-item{% if qzu contains '/awards' %} active{% endif %}">
    <span class="qz-nav-ico">🏆</span><span class="qz-nav-txt">Awards &amp; Honors</span>
  </a>

  <div class="qz-nav-foot">
    <div class="qz-nav-foot-label">Contact</div>
    <a href="mailto:usainzhou@g.ecc.u-tokyo.ac.jp" title="Email">
      <span class="qz-nav-foot-ico">📧</span><span>usainzhou@g.ecc.u-tokyo.ac.jp</span>
    </a>
    <a href="https://scholar.google.com/citations?hl=en&user=P2mHCpgAAAAJ" target="_blank" title="Google Scholar">
      <span class="qz-nav-foot-ico">🔗</span><span>Google Scholar</span>
    </a>
  </div>
</nav>
