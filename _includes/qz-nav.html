<style>
/* ============ Inline primary navigation (Quanxi Zhou site) ============ */
.qz-nav-wrap{
  margin:22px 0 26px;
}
.qz-nav{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
  background:linear-gradient(135deg,#ffffff 0%,#f4f8ff 100%);
  border:1px solid #dfe7f2;
  border-radius:18px;
  box-shadow:0 6px 20px rgba(27,58,107,.08);
  position:relative;
}
.qz-nav::before{
  content:"";
  position:absolute;
  left:0; right:0; top:0;
  height:3px;
  background:linear-gradient(90deg,#1B3A6B,#2E6BB8,#5aa0ff,#2E6BB8,#1B3A6B);
  background-size:200% 100%;
  animation:qz-nav-shimmer 8s linear infinite;
  border-radius:18px 18px 0 0;
  opacity:.85;
}
@keyframes qz-nav-shimmer{
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}
.qz-nav a.qz-nav-item{
  flex:1 1 0;
  min-width:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  padding:14px 18px;
  border-radius:12px;
  background:#fff;
  border:1px solid #e4e8ee;
  color:#2b3648;
  font-size:14px;
  font-weight:600;
  letter-spacing:.2px;
  text-decoration:none !important;
  transition:transform .2s ease, box-shadow .2s ease,
             background .2s ease, color .2s ease, border-color .2s ease;
  position:relative;
  overflow:hidden;
}
.qz-nav a.qz-nav-item::after{
  content:"";
  position:absolute;
  left:12px; right:12px; bottom:6px;
  height:2px;
  background:linear-gradient(90deg,#2E6BB8,#5aa0ff);
  border-radius:2px;
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .25s ease;
}
.qz-nav a.qz-nav-item:hover{
  transform:translateY(-2px);
  border-color:#c6d5ec;
  box-shadow:0 8px 18px rgba(27,58,107,.12);
  color:#1B3A6B;
}
.qz-nav a.qz-nav-item:hover::after{
  transform:scaleX(1);
}
.qz-nav a.qz-nav-item .qz-nav-ico{
  font-size:17px;
  line-height:1;
  filter:saturate(.9);
}
.qz-nav a.qz-nav-item.active{
  background:linear-gradient(135deg,#1B3A6B 0%,#2E6BB8 100%);
  color:#fff !important;
  border-color:transparent;
  box-shadow:0 8px 22px rgba(27,58,107,.35),
             inset 0 1px 0 rgba(255,255,255,.15);
  transform:translateY(-1px);
}
.qz-nav a.qz-nav-item.active::before{
  content:"";
  position:absolute;
  left:14px; top:50%;
  width:6px; height:6px;
  border-radius:50%;
  background:#ffd76a;
  box-shadow:0 0 0 3px rgba(255,215,106,.25);
  transform:translateY(-50%);
  animation:qz-pulse 1.8s ease-in-out infinite;
}
.qz-nav a.qz-nav-item.active::after{ display:none; }
.qz-nav a.qz-nav-item.active:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(27,58,107,.45);
}
@keyframes qz-pulse{
  0%,100%{ box-shadow:0 0 0 3px rgba(255,215,106,.25); }
  50%    { box-shadow:0 0 0 6px rgba(255,215,106,.05); }
}

/* "You are here" mini label */
.qz-nav-here{
  display:none;
  margin-top:8px;
  font-size:11.5px;
  color:#5b6472;
  text-align:center;
  letter-spacing:.4px;
  text-transform:uppercase;
  font-weight:600;
}
.qz-nav-here b{ color:#1B3A6B; }
.qz-nav-here::before{
  content:"● ";
  color:#2E6BB8;
  font-size:9px;
  vertical-align:middle;
  margin-right:2px;
}
.qz-nav-wrap.show-here .qz-nav-here{ display:block; }

@media (max-width:640px){
  .qz-nav a.qz-nav-item{ flex:1 1 45%; padding:12px 10px; font-size:13px; }
  .qz-nav a.qz-nav-item .qz-nav-txt{ font-size:13px; }
}
</style>

{% assign qzu = page.url %}
<div class="qz-nav-wrap show-here">
  <nav class="qz-nav" aria-label="Primary">
    <a href="{{ '/' | relative_url }}" class="qz-nav-item{% if qzu == '/' %} active{% endif %}">
      <span class="qz-nav-ico">🏠</span><span class="qz-nav-txt">Home</span>
    </a>
    <a href="{{ '/cv/' | relative_url }}" class="qz-nav-item{% if qzu contains '/cv' %} active{% endif %}">
      <span class="qz-nav-ico">👤</span><span class="qz-nav-txt">Personal Experience</span>
    </a>
    <a href="{{ '/publications/' | relative_url }}" class="qz-nav-item{% if qzu contains '/publications' %} active{% endif %}">
      <span class="qz-nav-ico">📚</span><span class="qz-nav-txt">Publications</span>
    </a>
    <a href="{{ '/awards/' | relative_url }}" class="qz-nav-item{% if qzu contains '/awards' %} active{% endif %}">
      <span class="qz-nav-ico">🏆</span><span class="qz-nav-txt">Awards &amp; Honors</span>
    </a>
  </nav>
  <div class="qz-nav-here">
    You are currently on
    {% if qzu == '/' %}<b>Home</b>
    {% elsif qzu contains '/cv' %}<b>Personal Experience</b>
    {% elsif qzu contains '/publications' %}<b>Publications</b>
    {% elsif qzu contains '/awards' %}<b>Awards &amp; Honors</b>
    {% endif %}
  </div>
</div>
